name: ci

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Install resvg (fidelity harness renderer)
        run: |
          curl -sL -o /tmp/resvg.tar.gz https://github.com/linebender/resvg/releases/download/v0.47.0/resvg-linux-x86_64.tar.gz
          tar -xzf /tmp/resvg.tar.gz -C /tmp
          sudo install -m755 /tmp/resvg /usr/local/bin/resvg
      - name: Formatting
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Tests
        run: go test ./...
      - name: Fuzz smoke
        run: |
          go test -fuzz=FuzzParse -fuzztime=20s -run FuzzParse ./internal/path/
          go test -fuzz=FuzzOptimize -fuzztime=20s -run FuzzOptimize .

  image:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build and push
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          IMAGE=ghcr.io/${{ github.repository_owner }}/silk
          IMAGE=${IMAGE,,}
          docker build -t "$IMAGE:$VERSION" -t "$IMAGE:latest" .
          docker push "$IMAGE:$VERSION"
          docker push "$IMAGE:latest"
